name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check update type
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.actor == 'app/dependabot'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  ci-and-merge:
    name: CI and auto-merge
    needs: check
    runs-on: ubuntu-latest
    if: |
      needs.check.outputs.update-type == 'version-update:semver-patch' ||
      needs.check.outputs.update-type == 'version-update:semver-minor'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Rebase and merge PR
        run: gh pr merge --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
