# Lefthook configuration for TanStack Start project
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    prettier:
      glob: '*.{js,jsx,ts,tsx,json,css,md}'
      exclude: 'apps/web/src/routeTree.gen.ts'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
      priority: 1

    eslint:
      glob: 'apps/web/*.{js,jsx,ts,tsx}|packages/**/*.{js,jsx,ts,tsx}'
      exclude: 'apps/web/eslint.config.js|apps/web/vite.config.ts|apps/web/src/routeTree.gen.ts'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
      priority: 2

    stylelint:
      glob: '*.css'
      run: pnpm exec stylelint --fix {staged_files}
      stage_fixed: true
      priority: 2
